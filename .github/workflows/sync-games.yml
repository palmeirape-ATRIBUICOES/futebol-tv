name: '⚽ Auto Sync Games'

on:
  schedule:
    # Runs every 30 minutes, 24/7
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI

permissions:
  contents: read

jobs:
  sync:
    name: 'Sync Games from Source'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: '📥 Checkout'
        uses: actions/checkout@v4

      - name: '⚙️ Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: '📦 Install Dependencies'
        run: npm install

      - name: '🔄 Run Sync'
        run: node scripts/sync-games.js
